<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreeJSON Tutorial В· Track 4 В· дҝЎжҒҜйқўжқҝзұ»еһӢдёҖи§?/title>
  <link rel="icon" href="/assets/img/threejson.ico" type="image/x-icon">
  <script type="importmap">
    {
      "imports": {
        "threejson": "/builtins/full.js",
        "threejson/core": "/core/index.js",
        "three": "https://esm.sh/three@0.184.0",
        "three/examples/jsm/": "https://esm.sh/three@0.184.0/examples/jsm/",
        "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js@25.0.0",
        "html2canvas-pro": "https://esm.sh/html2canvas-pro@2.0.4",
        "gifuct-js": "https://esm.sh/gifuct-js@2.1.2",
        "three-mesh-bvh": "https://esm.sh/three-mesh-bvh@0.9.10?deps=three@0.184.0",
        "three-bvh-csg": "https://esm.sh/three-bvh-csg@0.0.18?deps=three@0.184.0,three-mesh-bvh@0.9.10"
      }
    }
  </script>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #1a1f28; font-family: Arial, "Microsoft YaHei", sans-serif; }
    #rootContainer { position: relative; width: 100vw; height: 100vh; }
    #canvasContainer { display: block; width: 100%; height: 100%; background: #111; }
    #loadingMask {
      position: absolute; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center;
      color: #fff; background: rgba(0,0,0,0.55); font-size: 15px;
    }
    #hint {
      position: absolute; left: 12px; bottom: 12px; z-index: 25; max-width: min(760px, 92vw);
      padding: 10px 12px; border-radius: 6px; background: rgba(10,14,20,0.82); color: #e8eaed; font-size: 12px; line-height: 1.5;
    }
    #hint code { color: #9cdcfe; }
  </style>
</head>
<body>
<div id="rootContainer">
  <canvas id="canvasContainer">йңҖиҰ?WebGL</canvas>
  <div id="loadingMask">еҠ иҪҪдёӯвҖ?/div>
  <div id="hint">
    <strong>гҖҗt04-08 дҝЎжҒҜйқўжқҝ GalleryгҖ?/strong> ж•°жҚ®пј?code>/assets/json/tutorial/track-04/04-08-info-panel-gallery.json</code><br>
    в‘?box+text(single) в‘?box+text(full) в‘?sprite+text в‘?sprite+html в‘?sprite+img в‘?ж©ҷиүІеҸҜе…ій—ӯпјҲ<code>fix: false</code>пјүв‘Ұ еҸідёҠ <code>type:img</code> port360 е…ЁжҷҜиҙҙеӣҫ<br>
    ж–ҮжЎЈпј?a href="/doc/info-panels.md" style="color:#79bbff">info-panels.md</a> В· еҸҜдәӨдә?DOM и§?<a href="./04-06-css3d-panel.html" style="color:#79bbff">t04-06 css3dPanel</a>
  </div>
</div>
<script type="module">
  import { createJsonScene } from "threejson";

  const sceneJsonUrl = "/assets/json/tutorial/track-04/04-08-info-panel-gallery.json";
  const canvas = document.getElementById("canvasContainer");
  const loadingMask = document.getElementById("loadingMask");
  let sceneRuntime;

  window.addEventListener("DOMContentLoaded", init);
  window.addEventListener("beforeunload", () => sceneRuntime?.dispose?.());

  async function init() {
    try {
      const response = await fetch(sceneJsonUrl);
      if (!response.ok) throw new Error("HTTP " + response.status);
      const sceneData = await response.json();
      sceneData.canvasWidth = window.innerWidth;
      sceneData.canvasHeight = window.innerHeight;
      sceneRuntime = await createJsonScene(sceneData, { canvas, resetScene: true, assetsBase: "/assets" });
      window.addEventListener("resize", () => sceneRuntime?.resize?.(window.innerWidth, window.innerHeight));
      sceneRuntime.start();
      loadingMask.style.display = "none";
    } catch (err) {
      console.error(err);
      loadingMask.textContent = "еҠ иҪҪеӨұиҙҘпј? + err.message;
    }
  }
</script>
</body>
</html>
