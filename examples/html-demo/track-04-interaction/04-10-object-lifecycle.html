<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreeJSON Tutorial · Track 4 · 单对象 lifecycle</title>
  <link rel="icon" href="../../../assets/img/threejson.ico" type="image/x-icon">
  <script type="importmap">
    {
      "imports": {
        "threejson": "../../../builtins/full.js",
        "threejson/core": "../../../core/index.js",
        "three": "https://esm.sh/three@0.184.0",
        "three/examples/jsm/": "https://esm.sh/three@0.184.0/examples/jsm/",
        "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js@25.0.0",
        "html2canvas-pro": "https://esm.sh/html2canvas-pro@2.0.4",
        "gifuct-js": "https://esm.sh/gifuct-js@2.1.2",
        "three-mesh-bvh": "https://esm.sh/three-mesh-bvh@0.9.10?deps=three@0.184.0",
        "three-bvh-csg": "https://esm.sh/three-bvh-csg@0.0.18?deps=three@0.184.0,three-mesh-bvh@0.9.10"
      }
    }
  </script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #1a1a1a;
      --text-main: #f3f5f7;
      --text-muted: rgba(232, 234, 237, 0.72);
    }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: var(--text-main);
    }
    #rootContainer { position: relative; width: 100vw; height: 100vh; }
    #canvasContainer { display: block; width: 100%; height: 100%; background: #222; }
    #loadingMask {
      position: absolute; inset: 0; z-index: 20;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.55);
    }
    #logPanel {
      position: absolute; top: 12px; right: 12px; z-index: 10;
      width: min(360px, calc(100vw - 24px));
      max-height: 40vh;
      overflow: auto;
      padding: 10px 12px;
      background: rgba(22, 26, 34, 0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      font-size: 12px;
      font-family: Consolas, monospace;
    }
    #logPanel h2 { margin: 0 0 8px; font-size: 13px; font-weight: 600; }
    #logPanel pre { margin: 0; white-space: pre-wrap; color: #a8d5a2; }
  </style>
</head>
<body>
<div id="rootContainer">
  <canvas id="canvasContainer">需要 WebGL</canvas>
  <div id="loadingMask">加载中…</div>
  <aside id="logPanel" aria-label="lifecycle log">
    <h2>Lifecycle log</h2>
    <pre id="logOutput">—</pre>
  </aside>
</div>
<script type="module">
  import { createJsonScene } from "threejson";
  import {
    createObjectLifecycleContext,
    deployJsonObjectAsync,
    getObjectByThreeJsonId,
    removeObjectByIdAsync
  } from "threejson/core";

  const sceneJsonUrl = "../../../assets/json/tutorial/track-04/04-10-object-lifecycle.json";
  const logLines = [];
  const lifecycleOptions = {
    bindSceneEvents: true,
    onObjectDeployed(ctx) {
      appendLog(`onObjectDeployed: ${ctx.threeJsonId} y=${ctx.object3D?.position?.y?.toFixed(2) ?? "?"}`);
    },
    onObjectBeforeRemove(ctx) {
      appendLog(`onObjectBeforeRemove: ${ctx.threeJsonId}`);
    },
    onSceneReady() {
      appendLog("load:onSceneReady");
    }
  };

  function appendLog(line) {
    logLines.push(line);
    document.getElementById("logOutput").textContent = logLines.join("\n");
  }

  const canvas = document.getElementById("canvasContainer");
  const sceneData = await fetch(sceneJsonUrl).then((response) => response.json());
  sceneData.canvasWidth = window.innerWidth;
  sceneData.canvasHeight = window.innerHeight;

  const runtime = await createJsonScene(sceneData, {
    canvas,
    assetsBase: "../../../assets",
    resetScene: true,
    ...lifecycleOptions
  });
  runtime.start();
  window.addEventListener("resize", () => runtime?.resize?.(window.innerWidth, window.innerHeight));

  document.getElementById("loadingMask").style.display = "none";

  window.addEventListener("keydown", async (event) => {
    const id = "lifecycle-demo-spawn";
    if (event.repeat) return;
    if (event.key === "d") {
      if (getObjectByThreeJsonId(id)) return;
      await deployJsonObjectAsync(runtime.scene, {
        threeJsonId: id,
        objType: "box",
        geometry: { width: 2, height: 2, depth: 2 },
        position: { x: 5, y: 2, z: 0 },
        material: { type: "standard", color: "#409eff" },
        events: {
          "object.ready": { script: "self.moveBy(0, 1.5, 0)" },
          "object.dispose": { script: "self.moveBy(0, 0.75, 0)\nawait wait(250)\nself.hide()" }
        }
      }, {
        _objectLifecycle: createObjectLifecycleContext(lifecycleOptions)
      });
      appendLog(`dynamic deploy: ${id}`);
      return;
    }
    if (event.key === "r") {
      if (!getObjectByThreeJsonId(id)) return;
      await removeObjectByIdAsync(runtime.scene, id, {
        _objectLifecycle: createObjectLifecycleContext(lifecycleOptions)
      });
      appendLog(`dynamic remove: ${id}`);
    }
  });
</script>
<!-- ThreeJSON demo hint (zh/en) -->
<div id="demoHintBox" class="demoHintBox" role="note">
  <button id="demoHintLangBtn" class="demoHintLangBtn" type="button" aria-label="Switch language">EN</button>
  <button id="demoHintCloseBtn" class="demoHintCloseBtn" type="button" aria-label="Close">&times;</button>
  <div id="demoHintText" class="demoHintText"></div>
</div>
<style>
  .demoHintBox{position:fixed;left:12px;bottom:12px;z-index:999;max-width:min(440px,calc(100vw - 24px));padding:10px 34px 10px 14px;background:rgba(18,18,22,.88);color:#e7e7ea;border:1px solid rgba(255,255,255,.14);border-radius:10px;font:12.5px/1.62 Arial,"Microsoft YaHei",sans-serif;box-shadow:0 10px 26px rgba(0,0,0,.32);backdrop-filter:blur(6px)}
  .demoHintBox code{color:#8fc4ff;font-size:11.5px;background:rgba(143,196,255,.12);padding:1px 4px;border-radius:4px}
  .demoHintBox[hidden]{display:none}
  .demoHintLangBtn,.demoHintCloseBtn{position:absolute;top:6px;border:none;background:transparent;color:#9aa0ab;font-size:11px;cursor:pointer;line-height:1;padding:2px 4px}
  .demoHintLangBtn{right:26px}
  .demoHintCloseBtn{right:6px;font-size:14px}
  .demoHintLangBtn:hover,.demoHintCloseBtn:hover{color:#fff}
</style>
<script>
(function(){
  var ZH_HINT = "【Track 4 · 单对象 lifecycle】<code>object.ready</code> 在 deploy 完成后执行；\n    <code>object.dispose</code> 在显式 async 删除前执行。绿色立方体加载后会弹跳。\n    按 <b>D</b> 动态创建蓝色对象，按 <b>R</b> 删除它并触发 dispose。\n    宿主 hook 日志见右侧面板。";
  var EN_HINT = "【Track 4 · Per-object lifecycle】<code>object.ready</code> runs after deploy completes;\n    <code>object.dispose</code> runs before explicit async removal. The green cube bounces once loaded.\n    Press <b>D</b> to dynamically create a blue object, press <b>R</b> to remove it and trigger dispose.\n    Host-hook logs appear in the right panel.";
  var box = document.getElementById("demoHintBox");
  var textEl = document.getElementById("demoHintText");
  var langBtn = document.getElementById("demoHintLangBtn");
  var closeBtn = document.getElementById("demoHintCloseBtn");
  if (!box) return;
  var KEY = "threejson.demoHint.lang";
  function detectLang(){
    try { var saved = localStorage.getItem(KEY); if (saved) return saved; } catch(e){}
    return (navigator.language||"").toLowerCase().indexOf("zh")===0 ? "zh" : "en";
  }
  var lang = detectLang();
  function render(){
    textEl.innerHTML = lang === "zh" ? ZH_HINT : EN_HINT;
    langBtn.textContent = lang === "zh" ? "EN" : "中";
  }
  langBtn.addEventListener("click", function(){
    lang = lang === "zh" ? "en" : "zh";
    try { localStorage.setItem(KEY, lang); } catch(e){}
    render();
  });
  closeBtn.addEventListener("click", function(){ box.hidden = true; });
  render();
})();
</script>
</body>
</html>
