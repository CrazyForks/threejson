<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreeJSON Tutorial · Track 3 · glTF 外部模型</title>
  <link rel="icon" href="../../../assets/img/favicon.ico" type="image/x-icon">
  <script type="importmap">
    
    {
      "imports": {
        "threejson": "../../../builtins/full.js",
        "threejson/core": "../../../core/index.js",
        "three": "https://esm.sh/three@0.184.0",
        "three/examples/jsm/": "https://esm.sh/three@0.184.0/examples/jsm/",
        "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js@25.0.0",
        "html2canvas-pro": "https://esm.sh/html2canvas-pro@2.0.4",
        "gifuct-js": "https://esm.sh/gifuct-js@2.1.2",
        "three-mesh-bvh": "https://esm.sh/three-mesh-bvh@0.9.10?deps=three@0.184.0",
        "three-bvh-csg": "https://esm.sh/three-bvh-csg@0.0.18?deps=three@0.184.0,three-mesh-bvh@0.9.10"
      }
    }
  
  </script>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #2f2f2f;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    #rootContainer {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #2f2f2f;
    }

    #canvasContainer {
      display: block;
      width: 100%;
      height: 100%;
      padding: 0;
      margin: 0;
      background: #222;
      outline: none;
    }

    #loadingMask {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: rgba(47, 47, 47, 0.72);
      font-size: 15px;
      text-align: center;
      padding: 16px;
    }

    #messageBox {
      position: absolute;
      top: 18px;
      left: 50%;
      z-index: 30;
      display: none;
      max-width: 76vw;
      padding: 8px 14px;
      border-radius: 4px;
      color: #fff;
      background: rgba(20, 20, 20, 0.82);
      font-size: 13px;
      transform: translateX(-50%);
    }

  </style>
</head>
<body>
<div id="rootContainer">
  <canvas id="canvasContainer">抱歉，你的浏览器不支持 WebGL。</canvas>
  <div id="loadingMask">Track 3 · glTF 外部模型加载中…</div>
  <div id="messageBox"></div>
</div>

<script type="module">
  import { createJsonScene } from "threejson";

  const canvasContainer = document.getElementById("canvasContainer");
  const loadingMask = document.getElementById("loadingMask");
  const messageBox = document.getElementById("messageBox");
  const sceneJsonUrl = "../../../assets/json/tutorial/track-03/03-01-external-gltf.json";

  let sceneRuntime;
  let renderLoop;
  let sceneMeta = {};

  window.addEventListener("DOMContentLoaded", () => {
    void initDemo();
  });
  window.addEventListener("beforeunload", wasteCleaner);

  async function initDemo() {
    try {
      const response = await fetch(sceneJsonUrl);
      if (!response.ok) {
        throw new Error(`加载场景 JSON 失败：${response.status}`);
      }
      const sceneData = await response.json();
      sceneMeta = {
        canvasWidth: window.innerWidth,
        canvasHeight: window.innerHeight
      };
      sceneData.canvasWidth = sceneMeta.canvasWidth;
      sceneData.canvasHeight = sceneMeta.canvasHeight;

      sceneRuntime = await createJsonScene(sceneData, {
        canvas: canvasContainer,
        assetsBase: "../../../assets"
      });
      renderLoop = sceneRuntime.renderLoop;

      initEventListener();
      renderLoop.start();
      setLoading(false);
    } catch (error) {
      console.error(error);
      setLoading(false);
      showMessage(`Track 3 · glTF 外部模型初始化失败：${error.message}`, "error");
    }
  }

  function initEventListener() {
    window.addEventListener("resize", windowResize);
    canvasContainer.addEventListener("contextmenu", rightClickHandler);
  }

  function windowResize() {
    sceneMeta.canvasWidth = window.innerWidth;
    sceneMeta.canvasHeight = window.innerHeight;
    renderLoop?.resize({
      width: sceneMeta.canvasWidth,
      height: sceneMeta.canvasHeight
    });
  }

  function rightClickHandler(event) {
    event.preventDefault();
  }

  function setLoading(flag) {
    loadingMask.style.display = flag ? "flex" : "none";
  }

  function showMessage(message, type = "info") {
    const colorMap = {
      info: "rgba(20, 20, 20, 0.82)",
      error: "rgba(180, 35, 24, 0.9)"
    };
    messageBox.textContent = message;
    messageBox.style.background = colorMap[type] || colorMap.info;
    messageBox.style.display = "block";
    window.clearTimeout(showMessage.timer);
    showMessage.timer = window.setTimeout(() => {
      messageBox.style.display = "none";
    }, 3400);
  }

  function wasteCleaner() {
    sceneRuntime?.dispose?.();
    window.removeEventListener("resize", windowResize);
    canvasContainer.removeEventListener("contextmenu", rightClickHandler);
  }
</script>
<!-- ThreeJSON demo hint (zh/en) -->
<div id="demoHintBox" class="demoHintBox" role="note">
  <button id="demoHintLangBtn" class="demoHintLangBtn" type="button" aria-label="Switch language">EN</button>
  <button id="demoHintCloseBtn" class="demoHintCloseBtn" type="button" aria-label="Close">&times;</button>
  <div id="demoHintText" class="demoHintText"></div>
</div>
<style>
  .demoHintBox{position:fixed;left:12px;bottom:12px;z-index:999;max-width:min(440px,calc(100vw - 24px));padding:10px 34px 10px 14px;background:rgba(18,18,22,.88);color:#e7e7ea;border:1px solid rgba(255,255,255,.14);border-radius:10px;font:12.5px/1.62 Arial,"Microsoft YaHei",sans-serif;box-shadow:0 10px 26px rgba(0,0,0,.32);backdrop-filter:blur(6px)}
  .demoHintBox code{color:#8fc4ff;font-size:11.5px;background:rgba(143,196,255,.12);padding:1px 4px;border-radius:4px}
  .demoHintBox[hidden]{display:none}
  .demoHintLangBtn,.demoHintCloseBtn{position:absolute;top:6px;border:none;background:transparent;color:#9aa0ab;font-size:11px;cursor:pointer;line-height:1;padding:2px 4px}
  .demoHintLangBtn{right:26px}
  .demoHintCloseBtn{right:6px;font-size:14px}
  .demoHintLangBtn:hover,.demoHintCloseBtn:hover{color:#fff}
</style>
<script>
(function(){
  var ZH_HINT = "【glTF 外部模型示例】数据文件：<code>../../../assets/json/tutorial/track-03/03-01-external-gltf.json</code>；模型文件：<code>../../../assets/model/gltf/threejson_unlit_pyramid.gltf</code>。本页使用友好分组里的 <code>worldInfo.externalModelList</code>，列表本身负责推导 <code>objType: \"externalModel\"</code>，单条记录继续保留 <code>modelFileType</code> 以显式控制加载器。";
  var EN_HINT = "【glTF external model example】Data file: <code>../../../assets/json/tutorial/track-03/03-01-external-gltf.json</code>; model file: <code>../../../assets/model/gltf/threejson_unlit_pyramid.gltf</code>. Uses the friendly <code>worldInfo.externalModelList</code>, which infers <code>objType: \"externalModel\"</code>; the record still keeps <code>modelFileType</code> to pick the loader explicitly.";
  var box = document.getElementById("demoHintBox");
  var textEl = document.getElementById("demoHintText");
  var langBtn = document.getElementById("demoHintLangBtn");
  var closeBtn = document.getElementById("demoHintCloseBtn");
  if (!box) return;
  var KEY = "threejson.demoHint.lang";
  function detectLang(){
    try { var saved = localStorage.getItem(KEY); if (saved) return saved; } catch(e){}
    return (navigator.language||"").toLowerCase().indexOf("zh")===0 ? "zh" : "en";
  }
  var lang = detectLang();
  function render(){
    textEl.innerHTML = lang === "zh" ? ZH_HINT : EN_HINT;
    langBtn.textContent = lang === "zh" ? "EN" : "中";
  }
  langBtn.addEventListener("click", function(){
    lang = lang === "zh" ? "en" : "zh";
    try { localStorage.setItem(KEY, lang); } catch(e){}
    render();
  });
  closeBtn.addEventListener("click", function(){ box.hidden = true; });
  render();
})();
</script>
</body>
</html>
