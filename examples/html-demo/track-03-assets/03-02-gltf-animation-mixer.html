<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreeJSON Tutorial · Track 3 · glTF 含剪辑 + AnimationMixer</title>
  <link rel="icon" href="../../../assets/img/favicon.ico" type="image/x-icon">
  <script type="importmap">
    
    {
      "imports": {
        "threejson": "../../../builtins/full.js",
        "threejson/core": "../../../core/index.js",
        "three": "https://esm.sh/three@0.184.0",
        "three/examples/jsm/": "https://esm.sh/three@0.184.0/examples/jsm/",
        "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js@25.0.0",
        "html2canvas-pro": "https://esm.sh/html2canvas-pro@2.0.4",
        "gifuct-js": "https://esm.sh/gifuct-js@2.1.2",
        "three-mesh-bvh": "https://esm.sh/three-mesh-bvh@0.9.10?deps=three@0.184.0",
        "three-bvh-csg": "https://esm.sh/three-bvh-csg@0.0.18?deps=three@0.184.0,three-mesh-bvh@0.9.10"
      }
    }
  
  </script>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #2f2f2f; font-family: Arial, "Microsoft YaHei", sans-serif; }
    #rootContainer { position: relative; width: 100vw; height: 100vh; background: #2f2f2f; }
    #canvasContainer { display: block; width: 100%; height: 100%; background: #222; outline: none; }
    #loadingMask {
      position: absolute; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center;
      color: #fff; background: rgba(47, 47, 47, 0.72); font-size: 15px; text-align: center; padding: 16px;
    }
  </style>
</head>
<body>
<div id="rootContainer">
  <canvas id="canvasContainer">需要 WebGL</canvas>
  <div id="loadingMask">Track 3 · glTF 动画剪辑加载中…</div>
</div>
<script type="module">
  import { createJsonScene } from "threejson";

  const canvasContainer = document.getElementById("canvasContainer");
  const loadingMask = document.getElementById("loadingMask");
  const sceneJsonUrl = "../../../assets/json/tutorial/track-03/03-02-gltf-animation-mixer.json";

  window.addEventListener("DOMContentLoaded", () => void initDemo());
  window.addEventListener("beforeunload", () => sceneRuntime?.dispose?.());

  let sceneRuntime;

  async function initDemo() {
    try {
      const response = await fetch(sceneJsonUrl);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const sceneData = await response.json();
      sceneData.canvasWidth = window.innerWidth;
      sceneData.canvasHeight = window.innerHeight;
      sceneRuntime = await createJsonScene(sceneData, {
        canvas: canvasContainer,
        assetsBase: "../../../assets"
      });
      window.addEventListener("resize", () =>
        sceneRuntime?.resize?.(window.innerWidth, window.innerHeight)
      );
      sceneRuntime.renderLoop.start();
      loadingMask.style.display = "none";
    } catch (e) {
      console.error(e);
      loadingMask.textContent = "加载失败：" + (e && e.message ? e.message : String(e));
    }
  }
</script>
<!-- ThreeJSON demo hint (zh/en) -->
<div id="demoHintBox" class="demoHintBox" role="note">
  <button id="demoHintLangBtn" class="demoHintLangBtn" type="button" aria-label="Switch language">EN</button>
  <button id="demoHintCloseBtn" class="demoHintCloseBtn" type="button" aria-label="Close">&times;</button>
  <div id="demoHintText" class="demoHintText"></div>
</div>
<style>
  .demoHintBox{position:fixed;left:12px;bottom:12px;z-index:999;max-width:min(440px,calc(100vw - 24px));padding:10px 34px 10px 14px;background:rgba(18,18,22,.88);color:#e7e7ea;border:1px solid rgba(255,255,255,.14);border-radius:10px;font:12.5px/1.62 Arial,"Microsoft YaHei",sans-serif;box-shadow:0 10px 26px rgba(0,0,0,.32);backdrop-filter:blur(6px)}
  .demoHintBox code{color:#8fc4ff;font-size:11.5px;background:rgba(143,196,255,.12);padding:1px 4px;border-radius:4px}
  .demoHintBox[hidden]{display:none}
  .demoHintLangBtn,.demoHintCloseBtn{position:absolute;top:6px;border:none;background:transparent;color:#9aa0ab;font-size:11px;cursor:pointer;line-height:1;padding:2px 4px}
  .demoHintLangBtn{right:26px}
  .demoHintCloseBtn{right:6px;font-size:14px}
  .demoHintLangBtn:hover,.demoHintCloseBtn:hover{color:#fff}
</style>
<script>
(function(){
  var ZH_HINT = "资源：<code>../../../assets/json/tutorial/track-03/03-02-gltf-animation-mixer.json</code>；glTF 含线性 <strong>translation</strong> 剪辑（约 1s 周期上下位移），加载后由 core 注册 <code>AnimationMixer</code>。\n    可在 JSON 上改 <code>animationMode</code> 为 <code>mixer</code> / <code>basic</code> 观察与声明式 <code>animations</code> 的协调（本示例未配声明式 rotate）。";
  var EN_HINT = "Data: <code>../../../assets/json/tutorial/track-03/03-02-gltf-animation-mixer.json</code>; the glTF has a linear <strong>translation</strong> clip (~1s up/down cycle), and core registers an <code>AnimationMixer</code> after loading.\n    Try changing <code>animationMode</code> to <code>mixer</code> / <code>basic</code> in the JSON to see how it coordinates with declarative <code>animations</code> (none configured in this example).";
  var box = document.getElementById("demoHintBox");
  var textEl = document.getElementById("demoHintText");
  var langBtn = document.getElementById("demoHintLangBtn");
  var closeBtn = document.getElementById("demoHintCloseBtn");
  if (!box) return;
  var KEY = "threejson.demoHint.lang";
  function detectLang(){
    try { var saved = localStorage.getItem(KEY); if (saved) return saved; } catch(e){}
    return (navigator.language||"").toLowerCase().indexOf("zh")===0 ? "zh" : "en";
  }
  var lang = detectLang();
  function render(){
    textEl.innerHTML = lang === "zh" ? ZH_HINT : EN_HINT;
    langBtn.textContent = lang === "zh" ? "EN" : "中";
  }
  langBtn.addEventListener("click", function(){
    lang = lang === "zh" ? "en" : "zh";
    try { localStorage.setItem(KEY, lang); } catch(e){}
    render();
  });
  closeBtn.addEventListener("click", function(){ box.hidden = true; });
  render();
})();
</script>
</body>
</html>
